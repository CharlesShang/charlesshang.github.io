<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Charles Shang</title>
  <meta name="description" content="Charles Shang 的个人主页">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ef;
      --ink: #1f2933;
      --muted: #5d6673;
      --accent: #0f766e;
      --line: #d9d4ca;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.12), transparent 38%),
        linear-gradient(315deg, rgba(127, 29, 29, 0.08), transparent 36%),
        var(--bg);
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 72px 0 56px;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--accent);
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(3rem, 9vw, 6.6rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .intro {
      max-width: 680px;
      margin: 28px 0 0;
      color: var(--muted);
      font-size: clamp(1.08rem, 2vw, 1.35rem);
      line-height: 1.65;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 34px;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.54);
      text-decoration: none;
      font-weight: 650;
    }

    .links a:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    section {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin-top: 72px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
    }

    article h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    article p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    @media (max-width: 720px) {
      main {
        padding-top: 48px;
      }

      section {
        grid-template-columns: 1fr;
        margin-top: 52px;
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">charlesshang.github.io</p>
    <h1>Charles Shang</h1>
    <p class="intro">
      这里是我的个人主页。你可以把这段文字改成自己的简介、作品方向、研究兴趣，
      或者任何想让别人第一眼看到的内容。
    </p>

    <nav class="links" aria-label="个人链接">
      <a href="https://github.com/charlesshang">GitHub</a>
      <a href="mailto:hello@example.com">Email</a>
      <a href="#projects">Projects</a>
    </nav>

    <section id="projects" aria-label="主页内容">
      <article>
        <h2>About</h2>
        <p>写一点你的背景、技能、兴趣，或者现在正在做的事情。</p>
      </article>
      <article>
        <h2>Projects</h2>
        <p>放几个项目、论文、作品集链接，让这个页面变成你的入口。</p>
      </article>
      <article>
        <h2>Contact</h2>
        <p>把邮箱、社交账号或简历链接放在这里，方便别人找到你。</p>
      </article>
    </section>
  </main>
</body>
</html>
