<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Charles Shang</title>
  <meta name="description" content="Charles Shang personal homepage">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ef;
      --ink: #1f2933;
      --muted: #5d6673;
      --accent: #0f766e;
      --line: #d9d4ca;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    .language-toggle {
      position: fixed;
      top: 28px;
      right: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0;
      border: 0;
      color: var(--ink);
      background: transparent;
      font: inherit;
      font-size: 0.94rem;
      font-weight: 650;
      cursor: pointer;
    }

    .language-toggle:hover {
      color: var(--accent);
    }

    .language-toggle:focus-visible {
      outline: 0;
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 5px;
    }

    main {
      width: min(680px, calc(100% - 40px));
      margin: 0 auto;
      padding: 18vh 0 56px;
    }

    .eyebrow {
      margin: 0 0 24px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 7vw, 4.6rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .intro {
      max-width: 560px;
      margin: 30px 0 0;
      color: var(--muted);
      font-size: clamp(1.04rem, 2vw, 1.24rem);
      line-height: 1.75;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 38px;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 650;
    }

    .links a:hover {
      color: var(--accent);
    }

    .vibe-coding {
      display: none;
      margin-top: 72px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
    }

    html[data-lang="zh"] .vibe-coding {
      display: block;
    }

    .vibe-coding h2 {
      margin: 0 0 18px;
      font-size: 0.92rem;
      letter-spacing: 0;
    }

    .vibe-links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .vibe-card {
      display: block;
      min-height: 132px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.42);
      text-decoration: none;
    }

    .vibe-card:hover {
      border-color: var(--accent);
    }

    .vibe-card h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .vibe-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.65;
    }

    @media (max-width: 720px) {
      .language-toggle {
        top: 20px;
        right: 20px;
      }

      main {
        padding-top: 22vh;
      }

      .vibe-links {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <button class="language-toggle" type="button" aria-label="Switch language" aria-pressed="false">中文</button>
  <main>
    <p class="eyebrow">charlesshang.github.io</p>
    <h1 data-i18n="name">Charles Shang</h1>
    <p class="intro" data-i18n="intro">
      Reader. Thinker. Explorer.
    </p>

    <nav class="links" aria-label="personal links">
      <a href="https://github.com/charlesshang">GitHub</a>
    </nav>

    <section class="vibe-coding" aria-labelledby="vibe-coding-title">
      <h2 id="vibe-coding-title">Vibe Coding</h2>
      <nav class="vibe-links" aria-label="Vibe Coding links">
        <a class="vibe-card" href="https://charlesshang.github.io/yijing/index.html">
          <h3>易经</h3>
          <p>觀象以明變，窮理以知幾。</p>
        </a>
        <a class="vibe-card" href="https://charlesshang.github.io/sishi/index.html">
          <h3>四史</h3>
          <p>整理《史记》《汉书》《后汉书》《三国志》的阅读入口与历史脉络。</p>
        </a>
      </nav>
    </section>
  </main>
  <script>
    const translations = {
      en: {
        button: "中文",
        name: "Charles Shang",
        intro: "Reader. Thinker. Explorer."
      },
      zh: {
        button: "English",
        name: "Charles Shang",
        intro: "Reader. Thinker. Explorer."
      }
    };

    const root = document.documentElement;
    const toggle = document.querySelector(".language-toggle");
    const fields = document.querySelectorAll("[data-i18n]");

    function setLanguage(language) {
      const copy = translations[language];
      root.lang = language === "zh" ? "zh-CN" : "en";
      root.dataset.lang = language;
      toggle.textContent = copy.button;
      toggle.setAttribute("aria-pressed", String(language === "zh"));
      fields.forEach((field) => {
        field.textContent = copy[field.dataset.i18n];
      });
    }

    toggle.addEventListener("click", () => {
      setLanguage(root.dataset.lang === "zh" ? "en" : "zh");
    });

    setLanguage("en");
  </script>
</body>
</html>
