<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Charles Shang</title>
  <meta name="description" content="Charles Shang personal homepage">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ef;
      --ink: #1f2933;
      --muted: #5d6673;
      --accent: #0f766e;
      --line: #d9d4ca;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    main {
      width: min(680px, calc(100% - 40px));
      margin: 0 auto;
      padding: 18vh 0 56px;
    }

    .eyebrow {
      margin: 0 0 24px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5.6vw, 3.6rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .intro {
      max-width: 560px;
      margin: 30px 0 0;
      color: var(--muted);
      font-size: clamp(1.04rem, 2vw, 1.24rem);
      line-height: 1.75;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 38px;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 650;
    }

    .links a:hover {
      color: var(--accent);
    }

    .vibe-coding {
      margin-top: 72px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
    }

    .vibe-coding h2 {
      margin: 0 0 18px;
      font-size: 0.92rem;
      letter-spacing: 0;
    }

    .vibe-links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .vibe-card {
      display: block;
      min-height: 132px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.42);
      text-decoration: none;
    }

    .vibe-card:hover {
      border-color: var(--accent);
    }

    .vibe-card h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .vibe-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.65;
    }

    .vibe-card p + p {
      margin-top: 8px;
    }

    @media (max-width: 720px) {
      main {
        padding-top: 22vh;
      }

      .vibe-links {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">charlesshang.github.io</p>
    <h1>Charles Shang</h1>
    <p class="intro">Reader. Thinker. Explorer.</p>

    <nav class="links" aria-label="personal links">
      <a href="https://github.com/charlesshang">GitHub</a>
    </nav>

    <section class="vibe-coding" aria-labelledby="vibe-coding-title">
      <h2 id="vibe-coding-title">氛圍編程</h2>
      <nav class="vibe-links" aria-label="氛圍編程 links">
        <a class="vibe-card" href="https://charlesshang.github.io/yijing/index.html">
          <h3>易經</h3>
          <p>觀象以明變，窮理以知幾。</p>
          <p>進退、得失、吉凶、悔吝。</p>
        </a>
        <a class="vibe-card" href="https://charlesshang.github.io/sishi/index.html">
          <h3>四史</h3>
          <p>自黃帝以至晉初，凡三千年之興衰治亂，皆在四史之間</p>
          <p>史記，漢書，後漢書，三國志</p>
        </a>
      </nav>
    </section>
  </main>
</body>
</html>
