<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Charles Shang</title>
  <meta name="description" content="Charles Shang personal homepage">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ef;
      --ink: #1f2933;
      --muted: #5d6673;
      --accent: #0f766e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    .language-toggle {
      position: fixed;
      top: 28px;
      right: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      color: var(--ink);
      font: inherit;
      font-size: 0.94rem;
      font-weight: 650;
      text-decoration: none;
    }

    .language-toggle:hover {
      color: var(--accent);
    }

    .language-toggle:focus-visible {
      outline: 0;
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 5px;
    }

    main {
      width: min(680px, calc(100% - 40px));
      margin: 0 auto;
      padding: 18vh 0 56px;
    }

    .eyebrow {
      margin: 0 0 24px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5.6vw, 3.6rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .intro {
      max-width: 560px;
      margin: 30px 0 0;
      color: var(--muted);
      font-size: clamp(1.04rem, 2vw, 1.24rem);
      line-height: 1.75;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 38px;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 650;
    }

    .links a:hover {
      color: var(--accent);
    }

    @media (max-width: 720px) {
      .language-toggle {
        top: 20px;
        right: 20px;
      }

      main {
        padding-top: 22vh;
      }
    }
  </style>
</head>
<body>
  <a class="language-toggle" href="index_zh.html" aria-label="Open Chinese page">中文</a>
  <main>
    <p class="eyebrow">charlesshang.github.io</p>
    <h1>Charles Shang</h1>
    <p class="intro">Reader. Thinker. Explorer.</p>

    <nav class="links" aria-label="personal links">
      <a href="https://github.com/charlesshang">GitHub</a>
    </nav>
  </main>
</body>
</html>
