<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Charles Shang</title>
  <meta name="description" content="Charles Shang personal homepage">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ef;
      --ink: #1f2933;
      --muted: #5d6673;
      --accent: #0f766e;
      --line: #d9d4ca;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    main {
      width: min(680px, calc(100% - 40px));
      margin: 0 auto;
      padding: 18vh 0 56px;
    }

    .eyebrow {
      margin: 0 0 24px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5.6vw, 3.6rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .intro {
      max-width: 560px;
      margin: 30px 0 0;
      color: var(--muted);
      font-size: clamp(1.04rem, 2vw, 1.24rem);
      line-height: 1.75;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 38px;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 28px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 650;
    }

    .links svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      fill: currentColor;
    }

    .links .stroke-icon {
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2;
    }

    .links a:hover {
      color: var(--accent);
    }

    .vibe-coding {
      margin-top: 72px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
    }

    .vibe-coding h2 {
      margin: 0 0 18px;
      font-size: 0.92rem;
      letter-spacing: 0;
    }

    .vibe-links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .vibe-card {
      display: block;
      min-height: 132px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.42);
      text-decoration: none;
    }

    .vibe-card:hover {
      border-color: var(--accent);
    }

    .vibe-card h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .vibe-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.65;
    }

    .vibe-card p + p {
      margin-top: 8px;
    }

    @media (max-width: 720px) {
      main {
        padding-top: 22vh;
      }

      .vibe-links {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">charlesshang.github.io</p>
    <h1>Charles Shang</h1>
    <p class="intro">Reader. Thinker. Explorer.</p>

    <nav class="links" aria-label="personal links">
      <a href="https://github.com/charlesshang">
        <svg viewBox="0 0 24 24" aria-hidden="true">

        </svg>
        GitHub
      </a>
      <a href="https://www.linkedin.com/in/charlesshang/?locale=en">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20.45 20.45h-3.56v-5.58c0-1.33-.03-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.95v5.67H9.34V8.98h3.42v1.56h.05a3.75 3.75 0 0 1 3.38-1.86c3.61 0 4.28 2.38 4.28 5.47v6.3ZM5.32 7.41a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12Zm1.78 13.04H3.54V8.98H7.1v11.47ZM22.23 0H1.76C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.76 24h20.47c.97 0 1.77-.77 1.77-1.72V1.72C24 .77 23.2 0 22.23 0Z"/>

      </a>
      <a href="https://scholar.google.com/citations?user=HvTC0TIAAAAJ&amp;hl=en&amp;oi=ao">
        <svg class="stroke-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="m3 7 9-4 9 4-9 4-9-4Z"/>
          <path d="M5 10v5.5c0 1.1 3.1 2.5 7 2.5s7-1.4 7-2.5V10"/>
          <path d="M21 7v6"/>
        </svg>
        Google Scholar
      </a>
    </nav>

    <section class="vibe-coding" aria-labelledby="vibe-coding-title">
      <h2 id="vibe-coding-title">氛圍編程</h2>
      <nav class="vibe-links" aria-label="氛圍編程 links">
        <a class="vibe-card" href="https://charlesshang.github.io/yijing/index.html">
          <h3>易經</h3>
          <p>觀象以明變，窮理以知幾。</p>
          <p>進退、得失、吉凶、悔吝。</p>
        </a>
        <a class="vibe-card" href="https://charlesshang.github.io/sishi/index.html">
          <h3>四史</h3>
          <p>自黃帝以至晉初，凡三千年之興衰治亂，皆在四史之間</p>
          <p>史記，漢書，後漢書，三國志</p>
        </a>
      </nav>
    </section>
  </main>
</body>
</html>
